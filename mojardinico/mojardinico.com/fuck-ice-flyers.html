\n\n\u003cscript\u003e\n    const hexCodes = ['#00FF2F', '#00FFEA', '#FF5900', '#FF00FF', '#FF0000', '#F6FF00', '#DDFF00', '#cde0f5', '#e362d3', '#01a451'];\n\n    const cursor = document.querySelector(\".custom-cursor\");\n\n    document.addEventListener(\"mousemove\", (e) =\u003e {\n        // Update the main cursor position\n        cursor.style.left = `${e.pageX}px`;\n        cursor.style.top = `${e.pageY}px`;\n\n        // Create a square trail point with random color\n        const vectorPoint = document.createElement(\"div\");\n        vectorPoint.className = \"vector-point\";\n        document.body.appendChild(vectorPoint);\n        vectorPoint.style.left = `${e.pageX}px`;\n        vectorPoint.style.top = `${e.pageY}px`;\n        vectorPoint.style.backgroundColor = hexCodes[Math.floor(Math.random() * hexCodes.length)];\n\n        // Randomize the size of the trail point\n        const size = Math.random() * 8 + 4;\n        vectorPoint.style.width = `${size}px`;\n        vectorPoint.style.height = `${size}px`;\n\n        // Trigger the fade-out effect with a delay\n        fadeOutVectorPoint(vectorPoint);\n    });\n\n    function fadeOutVectorPoint(vectorPoint) {\n        setTimeout(() =\u003e {\n            vectorPoint.style.opacity = \"0\";\n            vectorPoint.addEventListener(\"transitionend\", () =\u003e {\n                vectorPoint.remove();\n            });\n        }, 200); // Delay before starting fade-out for a \"choppier\" trail\n    }\n\u003c/script\u003e","options":{"clear_content":false,"use_iframe":false},"clear_content":false,"fixed_position":"w","is_above":true,"sticked":"","_hidden":[],"_z":[{"pid":"66162a7f706f180019375fd5","value":306},{"pid":"66162a7f706f180019375fd6","value":309},{"pid":"66162a7f706f180019375fd9","value":311},{"pid":"66162a7f706f180019375fdb","value":306},{"pid":"66162a7f706f180019375fde","value":307},{"pid":"670af4837f9e0eed644952d7","value":358},{"pid":"671b2dd8a6973d25aa6317af","value":308},{"pid":"67208b7db648a
